name: CICD pipeline for ebook app

on:
  push:
    branches:
      - main

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

  setup-python:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

  install-dependencies:
    runs-on: ubuntu-latest
    needs: setup-python
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          sudo apt-get install -y libcairo2 libcairo2-dev libpango1.0-dev
          pip install -r requirements.txt

  run-tests:
    runs-on: ubuntu-latest
    needs: install-dependencies
    env:
      DJANGO_SECRET_KEY: "test-secret-key"
      DJANGO_DEBUG: "True"
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run tests with coverage
        run: |
          coverage run manage.py test
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies for lint
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pylint
        run: |
          pip install pylint
          pylint --ignore=migrations,tests --fail-under=7.0 $(git ls-files '*.py' ':!:ebookapp/tests/*') || true

  sonar:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Verify coverage file exists
        run: ls -l coverage.xml

      - name: Run SonarQube
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Gaurav906-star_ebook-store
            -Dsonar.organization=gaurav906-star
            -Dsonar.sources=ebookapp,manage.py
            -Dsonar.exclusions=**/migrations/**,ebookapp/tests/**
            -Dsonar.python.coverage.reportPaths=coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - uses: actions/checkout@v4
      - name: Generate ZIP build
        run: zip -r ebook-app.zip . -x "*.git*" "venv"

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebook-zip
          path: ebook-app.zip

  upload:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: ebook-zip

      - name: Upload build to S3
        run: |
          aws s3 cp ebook-app.zip s3://ebook-build-bucket-01dec/ebook-app.zip --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: upload
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "ebook-store" \
            --version-label "deploy-${{ github.run_number }}" \
            --source-bundle S3Bucket="ebook-build-bucket-01dec",S3Key="ebook-app.zip" \
            --region us-east-1

          aws elasticbeanstalk update-environment \
            --environment-name "Ebook-store-prod-env-new" \
            --version-label "deploy-${{ github.run_number }}" \
            --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
