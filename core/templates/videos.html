{% load static %}

<!doctype html>
<html>
<head>
    <title>Your Videos</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        .video-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .video-left {
            flex: 1;
        }

        .video-right {
            width: 520px;
        }

        .status {
            font-weight: bold;
        }

        .progress-container {
            background: #eee;
            height: 8px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .progress-fill {
            background: #4caf50;
            height: 100%;
            width: 0%;
            border-radius: 5px;
        }
    </style>
</head>

<body>
<div class="app">

    <div class="sidebar">
        <h2>⚡ TranscodeCloud</h2>
        <ul>
            <li onclick="goHome()">⬆ Upload</li>
            <li class="active">🎬 Videos</li>
        </ul>
    </div>

    <div class="main">
        <h1>🎬 Your Videos</h1>
        <div id="videosContainer"></div>
    </div>

</div>

<script>
function goHome() {
    window.location.href = "/";
}

const players = {};
let renderedVideos = {}; // track already rendered

// Initial fetch
function fetchVideos() {
    fetch("/videos/")
        .then(res => res.json())
        .then(data => {
            const videos = Array.isArray(data) ? data : data.data;
            renderVideos(videos || []);
        })
        .catch(err => {
            console.error(err);
        });
}

// Render ONLY once
function renderVideos(videos) {
    const container = document.getElementById("videosContainer");

    videos.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

    videos.forEach(v => {

        if (renderedVideos[v.id]) return; // ✅ prevent re-render

        renderedVideos[v.id] = true;

        const statusLabel =
            v.status === "pending" ? "🟡 Pending" :
            v.status === "processing" ? "🟠 Processing" :
            v.status === "completed" ? "🟢 Completed" :
            "⚪ Unknown";

        const card = document.createElement("div");
        card.className = "video-card";

        card.innerHTML = `
            <div class="video-left">
                <h3>${v.title || v.name}</h3>
                <p><b>File:</b> ${v.name}</p>

                <p id="desc-${v.id}">${v.description || ""}</p>
                <p>🏷 ${Array.isArray(v.tags) ? v.tags.join(", ") : ""}</p>

                <p id="status-${v.id}" class="status ${v.status}">
                    ${statusLabel}
                </p>

                <div class="progress-container">
                    <div id="progress-${v.id}" class="progress-fill" style="width:${v.progress || 0}%"></div>
                </div>

                <p id="progress-text-${v.id}">${v.progress || 0}%</p>
            </div>

            <div class="video-right">
                <div id="player-container-${v.id}"></div>
            </div>
        `;

        container.appendChild(card);

        // Player setup
        if (v.status === "completed" && v.hls) {
            setupPlayer(v);
        }
    });
}

// Setup player once
function setupPlayer(v) {
    const container = document.getElementById(`player-container-${v.id}`);

    if (!container || players[v.id]) return;

    container.innerHTML = `
        <video id="player-${v.id}" controls width="500"></video>
    `;

    const video = document.getElementById(`player-${v.id}`);

    if (Hls.isSupported()) {
        const hls = new Hls({
            debug: true   // ✅ enable debug logs
        });

        hls.loadSource(v.hls);
        hls.attachMedia(video);

        // 🔥 KEY: detect quality switch
        hls.on(Hls.Events.LEVEL_SWITCHED, function (event, data) {
            console.log(`Video ${v.id} switched to level:`, data.level);
        });

        // 🔥 Show available qualities
        hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
            console.log("Available levels:", hls.levels);
            video.play().catch(() => {});
        });

        players[v.id] = hls;
    }
}

// 🔄 Update ONLY status (no re-render)
function updateVideos() {
    fetch("/videos/")
        .then(res => res.json())
        .then(data => {
            const videos = Array.isArray(data) ? data : data.data;

            videos.forEach(v => {

                // Update status
                const statusEl = document.getElementById(`status-${v.id}`);
                if (statusEl) {
                    const statusLabel =
                        v.status === "pending" ? "🟡 Pending" :
                        v.status === "processing" ? "🟠 Processing" :
                        v.status === "completed" ? "🟢 Completed" :
                        "⚪ Unknown";

                    statusEl.innerText = statusLabel;
                    statusEl.className = `status ${v.status}`;
                }

                // Update progress
                const progressEl = document.getElementById(`progress-${v.id}`);
                const progressText = document.getElementById(`progress-text-${v.id}`);

                if (progressEl) progressEl.style.width = `${v.progress || 0}%`;
                if (progressText) progressText.innerText = `${v.progress || 0}%`;

                // Setup player if just completed
                if (v.status === "completed" && v.hls && !players[v.id]) {
                    setupPlayer(v);
                }
            });
        });
}

// 🚀 Initial load
fetchVideos();

// 🔄 Poll only updates (SAFE)
setInterval(updateVideos, 5000);

</script>

</body>
</html>
