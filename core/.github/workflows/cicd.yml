name: CICD pipeline for Video Transcoder

on:
push:
branches:
- main

jobs:

setup:
runs-on: ubuntu-latest
steps:
- name: Checkout Repository
uses: actions/checkout@v4
  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: "3.12"

  - name: Install system dependencies (FFmpeg)
    run: |
      sudo apt-get update
      sudo apt-get install -y ffmpeg

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

lint:
runs-on: ubuntu-latest
needs: setup
steps:
- uses: actions/checkout@v4

  - name: Install lint dependencies
    run: |
      python -m pip install --upgrade pip
      pip install pylint

  - name: Run pylint
    run: |
      pylint --ignore=migrations --fail-under=7.0 $(git ls-files '*.py') || true


test:
runs-on: ubuntu-latest
needs: lint
env:
DJANGO_SECRET_KEY: "test-secret"
DJANGO_DEBUG: "True"

steps:
  - uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Run Django checks
    run: |
      python manage.py check

  - name: Run migrations
    run: |
      python manage.py migrate

  - name: Run tests
    run: |
      python manage.py test || true


build:
runs-on: ubuntu-latest
needs: test
steps:
- uses: actions/checkout@v4


  - name: Create ZIP build
    run: |
      zip -r videotranscoder.zip . -x "*.git*" "venv" "__pycache__/*"

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: video-transcoder-build
      path: videotranscoder.zip


upload:
runs-on: ubuntu-latest
needs: build
steps:
- uses: actions/checkout@v4


  - name: Download build artifact
    uses: actions/download-artifact@v4
    with:
      name: video-transcoder-build

  - name: Upload to S3
    run: |
      aws s3 cp videotranscoder.zip s3://video-transcoder-builds/videotranscoder.zip --region us-east-1
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}


deploy:
runs-on: ubuntu-latest
needs: upload
steps:
- uses: actions/checkout@v4


  - name: Deploy to Elastic Beanstalk
    run: |
      aws elasticbeanstalk create-application-version \
        --application-name "video-transcoder-app" \
        --version-label "deploy-${{ github.run_number }}" \
        --source-bundle S3Bucket="video-transcoder-builds",S3Key="videotranscoder.zip" \
        --region us-east-1

      aws elasticbeanstalk update-environment \
        --environment-name "video-transcoder-env" \
        --version-label "deploy-${{ github.run_number }}" \
        --region us-east-1
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

